schema_version: 1
project: VIGIL
updated_at: 2026-07-18
rules:
  production_requires_status: approved
  exact_fidelity_assets_are_immutable: true
  missing_dependencies_trigger_user_request: true
  scaffold_assets_allowed_only_when_task_explicitly_permits: true

assets:
  - id: REF-UI-001
    name: Legio Focus interface reference
    category: visual-reference
    status: reference-only
    path: docs/assets/legio-focus-ui-reference.png
    provenance: supplied-by-user-in-conversation
    dimensions_px: [1672, 941]
    permitted_usage:
      - visual direction
      - layout analysis
      - component inventory
    prohibited_usage:
      - shipping as application background
      - cropping into production controls
      - claiming ownership of embedded artwork
    notes: >-
      Defines the requested dense Roman pixel-art dashboard direction. Implementation
      must remain componentized with live HTML text and controls.

  - id: SCAFFOLD-UI-001
    name: Generated UI frames and textures
    category: ui-kit
    status: scaffold-only
    source: scripts/generate_pixel_assets.py
    implementation_paths:
      - public/assets/ui/frames
      - public/assets/ui/textures
    permitted_usage:
      - layout prototyping
      - technical border-image experiments
      - automated development screenshots
    prohibited_usage:
      - production art lock
      - marketing screenshots

  - id: SCAFFOLD-COMP-001
    name: Generated legionary sprite sheets
    category: character-sprite
    status: scaffold-only
    source: scripts/generate_pixel_assets.py
    implementation_paths:
      - public/assets/pixel/legionary-idle.png
      - public/assets/pixel/legionary-preparing.png
      - public/assets/pixel/legionary-focus.png
      - public/assets/pixel/legionary-paused.png
      - public/assets/pixel/legionary-break.png
      - public/assets/pixel/legionary-complete.png
    source_frame_px: [64, 96]
    frames_per_state: 4
    permitted_usage:
      - prototype state synchronization
      - layout and integer-scaling tests
    prohibited_usage:
      - final character art

  - id: SCAFFOLD-BRAND-001
    name: Generated VIGIL shield mark
    category: brand-placeholder
    status: scaffold-only
    source: scripts/generate_pixel_assets.py
    implementation_paths:
      - public/assets/brand
      - src-tauri/icons

  - id: PROD-BRAND-001
    name: Final product name and brand lockup
    category: brand
    status: request-user
    required_by: v0.5.0
    requested_files:
      - editable vector logo or approved pixel master
      - square application mark
    required_decisions:
      - final name VIGIL versus alternative
      - wordmark spelling
      - tagline
      - permitted colour variants

  - id: PROD-COMP-001
    name: Production legionary companion sprite set
    category: character-sprite
    status: request-user
    required_by: v0.1.0-art-lock
    reference: REF-UI-001
    requested_format:
      - aseprite-or-layered-source
      - transparent-png-sprite-sheets
    source_frame_px: [64, 96]
    required_states:
      - idle
      - preparing
      - focusing
      - paused
      - short-break
      - long-break
      - complete
      - reform
    minimum_frames_per_state: 4
    exact_requirements:
      - consistent anatomy and equipment
      - identical palette across states
      - nearest-neighbour safe
      - no baked background
    waiver:
      decided_by: user
      decided_at: 2026-07-18
      terms: >-
        Deferred to v0.1.0 art-lock. SCAFFOLD-COMP-001 may be used through v0.1.0
        vertical-slice development and testing (VIGIL-006, VIGIL-011). Production
        art must be supplied and approved before the v0.1.0 release; scaffold
        screenshots are not production baselines.

  - id: PROD-CAMP-001
    name: Production camp growth scene
    category: scene-art
    status: request-user
    required_by: v0.3.0
    reference: REF-UI-001
    requested_format:
      - aseprite-or-layered-source
      - transparent-png
    target_css_box: [410, 460]
    suggested_source_px: [104, 116]
    required_states:
      - stage-1-bare-ground
      - stage-2-first-tent
      - stage-3-palisade
      - stage-4-watchtower
      - stage-5-full-camp
    exact_requirements:
      - identical palette to the companion sprite set
      - nearest-neighbour safe at integer scale
      - additive stages (each later stage keeps the earlier structures)
      - no baked background outside the scene
    blocks:
      - VIGIL-029

  - id: PROD-COMP-002
    name: Production cosmetic equipment variants
    category: character-sprite
    status: request-user
    required_by: v0.3.0
    reference: PROD-COMP-001
    requested_format:
      - aseprite-or-layered-source
      - transparent-png-overlay-layers
    source_frame_px: [64, 96]
    required_items:
      - helmet-crest
      - shield-emblem
      - cloak
    exact_requirements:
      - aligns frame-for-frame with the PROD-COMP-001 states
      - identical palette and anatomy
      - overlay layers must not bake in the base companion
    blocks:
      - VIGIL-030

  - id: PROD-UI-001
    name: Production Roman pixel UI kit
    category: ui-kit
    status: request-user
    required_by: v0.1.0-art-lock
    reference: REF-UI-001
    requested_files:
      - outer frame
      - parchment 9-slice frame
      - stone 9-slice frame
      - dark 9-slice frame
      - red active tab 9-slice
      - green red orange purple button states
      - laurel eagle standard and divider ornaments
      - focus break settings statistics priority and metric icons
    required_states:
      - default
      - hover
      - pressed
      - disabled
      - keyboard-focus
    rules:
      - no functional text baked into assets
      - corners must preserve shape under 9-slice scaling
      - transparent backgrounds where applicable
    waiver:
      decided_by: user
      decided_at: 2026-07-18
      terms: >-
        Deferred to v0.1.0 art-lock. SCAFFOLD-UI-001 may be used through v0.1.0
        vertical-slice development and testing (VIGIL-011). Production art must be
        supplied and approved before the v0.1.0 release; scaffold screenshots are
        not production baselines.

  - id: PROD-RANK-001
    name: Rank badge set
    category: ui-icon
    status: request-user
    optional: true
    required_by: v0.5.0
    reference: PROD-UI-001
    requested_format:
      - transparent-png
    sizes_px:
      - [32, 32]
      - [64, 64]
    required_items:
      - tiro
      - miles
      - immunis
      - decanus
      - tesserarius
      - optio
      - centurio
      - primus-pilus
    exact_requirements:
      - rising visual weight without loss or punishment framing
    notes: >-
      Optional. Without it the rank keeps its text name plus Roman numeral.

  - id: PROD-ONBOARD-001
    name: Onboarding and empty-state illustrations
    category: illustration
    status: request-user
    required_by: v0.5.0
    reference: REF-UI-001
    requested_format:
      - aseprite-or-layered-source
      - transparent-png
    required_states:
      - welcome-tour
      - empty-history
      - empty-camp
    exact_requirements:
      - identical palette to the companion sprite set
      - no baked text (all copy stays live HTML)

  - id: PROD-FONT-001
    name: Product typography
    category: font
    status: request-user
    optional: true
    required_by: v0.5.0
    current_fallback: system fonts (Georgia, Consolas)
    required_roles:
      - display-or-wordmark
      - body-small-legible
      - tabular-numerals-for-the-timer
    exact_requirements:
      - turkish glyph coverage
      - embedding and redistribution licence required
      - licence document must accompany the file
    notes: >-
      Optional. Staying on system fonts carries no licence risk.

  - id: PROD-INSTALL-001
    name: Installer wizard artwork
    category: distribution
    status: request-user
    required_by: v0.5.0
    requested_files:
      - nsis-header-banner-150x57
      - nsis-sidebar-164x314
      - msi-banner-493x58
      - msi-dialog-493x312
    exact_requirements:
      - no baked text (localisation)
      - readable at low resolution

  - id: PROD-STORE-001
    name: Marketplace listing kit
    category: distribution
    status: request-user
    required_by: v0.8.0
    blocked_by_decision: distribution channel not chosen
    channel_specs:
      microsoft-store:
        - store-logo-300x300
        - tiles-71x71-150x150-310x150-310x310
        - splash-620x300
        - screenshots-min-1366x768
      itch-io:
        - cover-630x500
        - banner
        - screenshots
        - gif-preview
      steam:
        - header-460x215
        - small-capsule-231x87
        - main-capsule-616x353
        - library-600x900
        - hero-3840x1240
    exact_requirements:
      - screenshots must come from the real app after art lock

  - id: PROD-WEB-001
    name: Web, social and documentation imagery
    category: distribution
    status: request-user
    required_by: v0.8.0
    requested_files:
      - social-preview-1200x630
      - favicon-16-32-48-and-ico
      - readme-hero-1280x640
    exact_requirements:
      - screenshots must come from the real app after art lock

  - id: PROD-AUDIO-001
    name: Focus ritual sound set
    category: audio
    status: request-user
    required_by: v0.2.0
    requested_files:
      - focus-start
      - focus-complete
      - short-break
      - long-break
      - subtle-button
    format: wav
    requirements:
      - user-owned-or-licensed
      - no aggressive battle effects
      - normalized loudness
