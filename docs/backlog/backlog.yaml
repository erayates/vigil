project: VIGIL
current_version: 0.2.0
next_release: 0.3.0
updated_at: 2026-07-18

items:
  - id: VIGIL-UI-001
    phase: P0-B
    version: 0.0.2
    status: done
    priority: P0
    title: Componentize Roman pixel dashboard
    asset_dependencies:
      - REF-UI-001
      - SCAFFOLD-UI-001
      - SCAFFOLD-COMP-001
    objective: Rebuild the supplied visual direction as semantic dashboard regions rather than a flat image.
    acceptance:
      - Campaign, timer, companion and summary are separate widgets.
      - Functional text is live HTML.
      - Main shell uses a 1600x900 baseline and remains usable at 1280x800.

  - id: VIGIL-ASSET-001
    phase: P0-B
    version: 0.0.2
    status: done
    priority: P0
    title: Enforce user asset dependency gate
    asset_dependencies:
      - NONE
    objective: Force coding agents to request missing visual/files from the user and stop the task.
    acceptance:
      - AGENTS.md contains mandatory stop conditions.
      - Asset registry and request template exist.
      - Scaffold assets cannot be marked production-approved silently.

  - id: VIGIL-STANDARDS-001
    phase: P0-B
    version: 0.0.2
    status: done
    priority: P0
    title: Establish coding and quality standards
    asset_dependencies:
      - NONE
    objective: Give agents enforceable TypeScript, React, CSS, Rust, Tauri, testing, security and versioning rules.
    acceptance:
      - Standards are linked from START-HERE and AGENTS.
      - Official source register maps research to decisions.
      - CI validation commands are documented.

  - id: VIGIL-UI-002
    phase: P0-C
    version: 0.0.3
    status: ready
    priority: P0
    title: Add deterministic dashboard visual tests
    asset_dependencies:
      - SCAFFOLD-UI-001
      - SCAFFOLD-COMP-001
    objective: Detect layout and pixel-scaling regressions without treating scaffold art as final.
    acceptance:
      - 1600x900 and 1280x800 screenshots are deterministic.
      - Time and animations are frozen.
      - Baseline update procedure distinguishes scaffold and production assets.

  - id: VIGIL-UI-003
    phase: P0-C
    version: 0.0.3
    status: ready
    priority: P0
    title: Complete keyboard and control-state pass
    asset_dependencies:
      - SCAFFOLD-UI-001
    objective: Make every visible control semantically correct and keyboard operable.
    acceptance:
      - Focus order preserves visual meaning.
      - Focus indicators remain visible over ornate frames.
      - Disabled roadmap controls communicate unavailability.

  - id: VIGIL-ASSET-002
    phase: P0-C
    version: 0.0.3
    status: deferred
    priority: P1
    title: Request production UI kit
    asset_dependencies:
      - PROD-UI-001
    objective: Obtain editable/approved production frames, controls, ornaments and icons.
    acceptance:
      - User supplies files or explicitly authorizes deferral.
      - Registry records provenance and review status.
      - Implementation does not continue as an art-lock task before response.

  - id: VIGIL-ASSET-003
    phase: P0-C
    version: 0.0.3
    status: deferred
    priority: P1
    title: Request production legionary sprite set
    asset_dependencies:
      - PROD-COMP-001
    objective: Obtain consistent production character states.
    acceptance:
      - All required animation states and source files are supplied or deferred.
      - Frame dimensions and palette are verified.
      - Registry reaches approved before production baseline.

  - id: VIGIL-001
    phase: P0-D
    version: 0.0.4
    status: done
    priority: P0
    title: Choose authoritative cross-window session ownership
    asset_dependencies:
      - NONE
    objective: Prove one source of truth shared by main and companion windows.
    acceptance:
      - A session state update in one window appears in the other.
      - Reloading one webview does not create an independent timer.
      - Decision is recorded in an ADR.

  - id: VIGIL-002
    phase: P0-D
    version: 0.0.4
    status: done
    priority: P0
    title: Implement SQLite migration spike
    asset_dependencies:
      - NONE
    objective: Create, migrate, insert and query a focus session locally.
    acceptance:
      - Migration runs on a clean profile.
      - Re-running migration is safe.
      - Integration test reads the inserted record.

  - id: VIGIL-003
    phase: P0-D
    version: 0.0.4
    status: done
    priority: P0
    title: Separate and review Tauri capabilities
    asset_dependencies:
      - NONE
    objective: Replace shared/default assumptions with minimum per-window permissions.
    acceptance:
      - Every permission maps to a documented use case.
      - Main and companion capability differences are explicit.
      - No shell or broad filesystem permission exists.
      - CSP decision is documented.

  - id: VIGIL-004
    phase: P1
    version: 0.1.0
    status: done
    priority: P0
    title: Build authoritative session state machine
    asset_dependencies:
      - NONE
    objective: Implement canonical commands, transitions and idempotency.
    acceptance:
      - Invalid transitions return typed errors.
      - Duplicate completion creates one record.
      - Unit tests cover every transition.

  - id: VIGIL-005
    phase: P1
    version: 0.1.0
    status: done
    priority: P0
    title: Persist missions and sessions
    asset_dependencies:
      - NONE
    objective: Replace prototype browser persistence with repositories and migrations.
    acceptance:
      - Records survive restart.
      - Active-session query returns at most one session.
      - Repository tests pass.

  - id: VIGIL-006
    phase: P1
    version: 0.1.0
    status: done
    priority: P0
    title: Synchronize companion state
    asset_dependencies:
      - PROD-COMP-001
    objective: Drive animation and controls from authoritative domain events.
    acceptance:
      - Preparing/focusing/paused/complete states match in both windows.
      - Companion reload does not reset session.
      - Missing production sprite dependency triggers the user request gate.

  - id: VIGIL-007
    phase: P1
    version: 0.1.0
    status: done
    priority: P0
    title: Recover session after restart
    asset_dependencies:
      - NONE
    objective: Recalculate remaining time and restore controls safely.
    acceptance:
      - Forced process termination does not lose active session.
      - Recovery cannot duplicate completion.

  - id: VIGIL-008
    phase: P1
    version: 0.1.0
    status: done
    priority: P1
    title: Implement abandon flow
    asset_dependencies:
      - NONE
    objective: Record focused duration and optional neutral interruption reason.
    acceptance:
      - No completed-session reward is granted.
      - Recorded focus time is preserved.

  - id: VIGIL-009
    phase: P1
    version: 0.1.0
    status: done
    priority: P1
    title: Make click-through recoverable
    asset_dependencies:
      - NONE
    objective: Guarantee the companion can always be interacted with again.
    acceptance:
      - Tray or global shortcut disables click-through.
      - Recovery path is documented in UI.

  - id: VIGIL-010
    phase: P1
    version: 0.1.0
    status: done
    priority: P1
    title: Clamp companion to monitor work area
    asset_dependencies:
      - NONE
    objective: Keep companion reachable across display changes.
    acceptance:
      - Removing a secondary display moves companion to primary display.
      - Saved off-screen coordinates are repaired.

  - id: VIGIL-011
    phase: P1
    version: 0.1.0
    status: done
    priority: P1
    title: Add v0.1 end-to-end tests
    asset_dependencies:
      - PROD-UI-001
      - PROD-COMP-001
    objective: Automate mission-to-history critical path and approved visual baseline.
    acceptance:
      - Happy path and restart recovery are automated.
      - CI publishes test result on pull requests.
      - Production screenshot baselines use approved assets only.

  - id: VIGIL-012
    phase: P1
    version: 0.1.0
    status: planned
    priority: P1
    title: Conduct five-user task test
    asset_dependencies:
      - NONE
    objective: Validate activation, dashboard clarity and companion distraction assumptions.
    acceptance:
      - Five complete sessions observed.
      - Findings and severity are documented.
      - P0/P1 findings are resolved or release-blocking.

  - id: VIGIL-013
    phase: P2
    version: 0.2.0
    status: done
    priority: P1
    title: Implement the debrief flow
    asset_dependencies:
      - NONE
    objective: After a watch ends, capture result, blocker and next action, then record it.
    acceptance:
      - Complete and abandoned sessions can open a debrief before returning to idle.
      - Result, blocker and next action persist with the session record.
      - Debrief is skippable and adds under 20 seconds median closure time.

  - id: VIGIL-014
    phase: P2
    version: 0.2.0
    status: done
    priority: P1
    title: Add campaign entity and mission attribution
    asset_dependencies:
      - NONE
    objective: Group missions under a persistent campaign so focus time attributes to a goal.
    acceptance:
      - Sessions attribute to a campaign via migration-backed tables.
      - The active campaign survives restart.
      - Existing session records migrate without loss.

  - id: VIGIL-015
    phase: P2
    version: 0.2.0
    status: done
    priority: P1
    title: Add break state and Doctrine preferences
    asset_dependencies:
      - NONE
    objective: Offer optional short and long breaks after focus per user Doctrine settings.
    acceptance:
      - Break is a first-class state in the session machine.
      - Doctrine preferences persist and recover.
      - Breaks are never forced; skipping is always available.

  - id: VIGIL-016
    phase: P2
    version: 0.2.0
    status: done
    priority: P2
    title: Add weekly local summary
    asset_dependencies:
      - NONE
    objective: Show focus time and completed watches across the last seven days, locally.
    acceptance:
      - Weekly totals derive from persisted records.
      - No network or account is used.
      - Empty and partial weeks render without error.

  - id: VIGIL-017
    phase: P2
    version: 0.2.0
    status: done
    priority: P1
    title: Add system tray behavior
    asset_dependencies:
      - SCAFFOLD-BRAND-001
    objective: Provide a tray icon and menu to show/hide the companion and disable click-through.
    acceptance:
      - Tray menu shows/hides the companion and disables click-through (closes VIGIL-009's deferred mechanism).
      - Closing the main window keeps the app in the tray per preference.
      - A capability and ADR cover the tray.

  - id: VIGIL-018
    phase: P2
    version: 0.2.0
    status: done
    priority: P2
    title: Add a global shortcut
    asset_dependencies:
      - NONE
    objective: Bind a global shortcut to start/pause and to recover companion interaction.
    acceptance:
      - The shortcut works when the app is unfocused.
      - Missing or conflicting shortcut permission fails gracefully.
      - The plugin has a least-privilege capability and an ADR.

  - id: VIGIL-019
    phase: P2
    version: 0.2.0
    status: done
    priority: P2
    title: Add native completion notification
    asset_dependencies:
      - NONE
    objective: Notify the user when a watch completes, even if the app is unfocused.
    acceptance:
      - Completion fires exactly one native notification.
      - Denied notification permission fails gracefully.
      - The plugin has a capability and an ADR.

  - id: VIGIL-020
    phase: P2
    version: 0.2.0
    status: done
    priority: P2
    title: Add autostart preference
    asset_dependencies:
      - NONE
    objective: Let the user opt into launching VIGIL at login.
    acceptance:
      - Autostart is off by default and user-toggled.
      - The preference persists and recovers.
      - The plugin has a capability and an ADR.

  - id: VIGIL-021
    phase: P2
    version: 0.2.0
    status: done
    priority: P2
    title: Add companion window preferences
    asset_dependencies:
      - NONE
    objective: Let the user set companion side, scale and opacity.
    acceptance:
      - Side, scale and opacity persist and recover.
      - Changes apply without a restart.
      - Preferences clamp to safe ranges.

  - id: VIGIL-022
    phase: P2
    version: 0.2.0
    status: done
    priority: P1
    title: Add local data export and import
    asset_dependencies:
      - NONE
    objective: Let the user export and re-import local data for backup and portability.
    acceptance:
      - Export produces a user-initiated, documented file.
      - Import validates and merges without corrupting existing data.
      - A round-trip preserves all records.

  - id: VIGIL-023
    phase: P2
    version: 0.2.0
    status: planned
    priority: P1
    title: Seven-day dogfood run
    asset_dependencies:
      - NONE
    objective: Use VIGIL daily for seven days to validate the daily-use alpha.
    acceptance:
      - Seven-day run completes without data loss.
      - Preferences recover correctly across restarts.
      - No P0 defects remain.

  - id: VIGIL-024
    phase: P3
    version: 0.3.0
    status: done
    priority: P1
    title: Define the Disciplina calculation policy
    asset_dependencies:
      - NONE
    objective: Derive a non-punitive consistency measure only from accepted focus records.
    acceptance:
      - Disciplina is computed from completed sessions, never from UI clicks.
      - A missed day never reduces accumulated Disciplina.
      - The policy is documented and unit-tested.

  - id: VIGIL-025
    phase: P3
    version: 0.3.0
    status: done
    priority: P1
    title: Add Formation Integrity (non-punitive continuity)
    asset_dependencies:
      - NONE
    objective: Replace destructive streak resets with a continuity that never erases work.
    acceptance:
      - A missed day never zeroes accumulated progress.
      - Continuity degrades gently rather than resetting to zero.
      - Behaviour is unit-tested.

  - id: VIGIL-026
    phase: P3
    version: 0.3.0
    status: done
    priority: P2
    title: Add Recovery Days
    asset_dependencies:
      - NONE
    objective: Let planned rest count as intentional recovery, not failure.
    acceptance:
      - A Recovery Day preserves continuity.
      - Recovery Days are user-marked and never forced.
      - They persist and recover across restart.

  - id: VIGIL-027
    phase: P3
    version: 0.3.0
    status: done
    priority: P1
    title: Add rank progression
    asset_dependencies:
      - NONE
    objective: Derive a rank from accumulated Disciplina without reward-first framing.
    acceptance:
      - Rank derives only from accepted records.
      - Rank never decreases because of a missed day.
      - The mission stays visually dominant over rank.

  - id: VIGIL-028
    phase: P3
    version: 0.3.0
    status: done
    priority: P2
    title: Add progress explanation and audit trail
    asset_dependencies:
      - NONE
    objective: Explain transparently how progression was derived from records.
    acceptance:
      - Every progression change traces to specific accepted records.
      - The explanation is visible to the user.
      - No hidden or random progression exists.

  - id: VIGIL-029
    phase: P3
    version: 0.3.0
    status: planned
    priority: P2
    title: Add camp growth visualization
    asset_dependencies:
      - PROD-CAMP-001
    objective: Visualize accumulated progress as a growing camp scene.
    acceptance:
      - Camp state derives from accepted records.
      - Growth never shrinks on a missed day.
      - Production camp art is supplied or deferral is explicitly authorized.

  - id: VIGIL-030
    phase: P3
    version: 0.3.0
    status: planned
    priority: P2
    title: Add cosmetic equipment unlocks
    asset_dependencies:
      - PROD-COMP-002
    objective: Unlock cosmetic companion equipment from progression — never paid or random.
    acceptance:
      - No loot boxes, random or paid rewards.
      - Unlocks derive from accepted records.
      - Production equipment art is supplied or deferral is explicitly authorized.

  - id: VIGIL-031
    phase: P3
    version: 0.3.0
    status: done
    priority: P1
    title: Progression guardrail review
    asset_dependencies:
      - NONE
    objective: Verify progression respects the non-punitive, mission-first guardrails.
    acceptance:
      - No loss-aversion timers or compulsion mechanics exist.
      - Missed days never erase accumulated work.
      - The mission remains visually dominant over progression.

  - id: VIGIL-032
    phase: P4
    version: 0.4.0
    status: done
    priority: P2
    title: Multi-monitor placement matrix
    asset_dependencies:
      - NONE
    objective: Keep the companion correctly placed across monitor add/remove, resolution and scale changes.
    acceptance:
      - Placement is defined for each monitor configuration in a documented matrix.
      - Removing or resizing a display never leaves the companion unreachable.
      - Placement logic is unit-tested.

  - id: VIGIL-033
    phase: P4
    version: 0.4.0
    status: done
    priority: P1
    title: Detect and classify suspend/resume gaps
    asset_dependencies:
      - NONE
    objective: Stop counting machine sleep as focus time without the user deciding.
    acceptance:
      - A suspend gap during a watch is detected on resume.
      - The user classifies the gap and the record reflects that choice.
      - Gap detection is unit-tested.

  - id: VIGIL-034
    phase: P4
    version: 0.4.0
    status: done
    priority: P1
    title: Recover from crashes and corrupted state
    asset_dependencies:
      - NONE
    objective: Never lose or silently delete data when stored state is invalid.
    acceptance:
      - Invalid stored state preserves a recovery record and returns to Idle.
      - A corrupted database is reported rather than silently recreated.
      - Recovery paths are unit-tested.

  - id: VIGIL-035
    phase: P4
    version: 0.4.0
    status: done
    priority: P1
    title: Reduced-motion and screen-reader review
    asset_dependencies:
      - NONE
    objective: Make the ritual usable without motion and with assistive technology.
    acceptance:
      - prefers-reduced-motion removes non-essential animation.
      - Every interactive control has an accessible name and role.
      - Phase changes announce once, never per second.

  - id: VIGIL-036
    phase: P4
    version: 0.4.0
    status: done
    priority: P2
    title: Set and verify an idle resource budget
    asset_dependencies:
      - NONE
    objective: Keep the companion cheap enough to leave running all day.
    acceptance:
      - Idle CPU and memory budgets are documented.
      - No timer or listener runs while idle.
      - Measurements are recorded against the budget.

  - id: VIGIL-037
    phase: P4
    version: 0.4.0
    status: done
    priority: P2
    title: Define installer and uninstaller data behaviour
    asset_dependencies:
      - NONE
    objective: Make explicit what happens to local data on install, upgrade and uninstall.
    acceptance:
      - Upgrade preserves the database and preferences.
      - Uninstall never deletes user data without explicit consent.
      - The behaviour is documented for the user.

  - id: VIGIL-038
    phase: P4
    version: 0.4.0
    status: done
    priority: P1
    title: Capability and dependency security audit
    asset_dependencies:
      - NONE
    objective: Confirm least privilege and a clean dependency surface before beta.
    acceptance:
      - Every capability permission maps to a feature actually used.
      - Dependency audits report no known vulnerabilities.
      - Findings are recorded.

  - id: VIGIL-039
    phase: P4
    version: 0.4.0
    status: done
    priority: P1
    title: Automated migration tests
    asset_dependencies:
      - NONE
    objective: Guarantee every schema upgrade path preserves existing data.
    acceptance:
      - Each migration step is exercised from the previous schema version.
      - Data written before a migration survives it.
      - Re-running migrations stays safe.
